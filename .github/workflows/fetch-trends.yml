      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add trends-data.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add trends-data.json
          git diff --staged --quiet || git commit -m "Update trends data"
          git push
