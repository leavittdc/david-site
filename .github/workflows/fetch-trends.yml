name: Fetch Trends Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch from SerpApi
        run: |
          curl "https://serpapi.com/search.json?engine=google_trends&q=data+center,AI+regulation,nuclear+energy,antitrust,deepfake&data_type=TIMESERIES&date=today+12-m&geo=US&api_key=${{ secrets.SERPAPI_KEY }}" \
            -o trends-data.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add trends-data.json
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "Update trends data"
          git push
